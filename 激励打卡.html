<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>低饱和多巴胺 · 每日健康打卡</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, "Microsoft Yahei", sans-serif;
        }
        body {
            /* 低饱和多巴胺柔和底色 */
            background-color: #f6f3ef;
            max-width: 540px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            color: #5a5550;
            font-size: 26px;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .date-text {
            color: #88837e;
            font-size: 15px;
        }
        .task-item {
            background: #ffffff;
            border-radius: 20px;
            padding: 20px 24px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 3px 12px rgba(120, 110, 100, 0.08);
            border: 1px solid #eeebe8;
        }
        .task-name {
            font-size: 17px;
            color: #4a4642;
            font-weight: 500;
        }
        .time-show {
            font-size: 14px;
            color: #99948f;
            margin-top: 5px;
        }
        /* 低饱和多巴胺按钮色系 */
        .btn-normal {
            padding: 10px 22px;
            border: none;
            border-radius: 16px;
            background-color: #8ca8b8;
            color: #fff;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s ease;
        }
        .btn-normal:hover {
            opacity: 0.9;
        }
        .btn-done {
            background-color: #9bb89c;
            cursor: default;
        }
        .btn-timing {
            background-color: #d4a88f;
        }
        .progress-box {
            text-align: center;
            margin-top: 45px;
            font-size: 17px;
            color: #5a5550;
            padding: 12px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 2px 8px rgba(120, 110, 100, 0.06);
        }
        /* 弹窗样式 低饱和卡通风 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background-color: rgba(90, 85, 80, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }
        .modal-card {
            background: #fffdfb;
            width: 88%;
            max-width: 400px;
            padding: 32px 28px;
            border-radius: 22px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(90, 85, 80, 0.12);
        }
        .modal-text {
            font-size: 17px;
            color: #4a4642;
            line-height: 1.75;
            margin-bottom: 28px;
        }
        .modal-close {
            padding: 11px 30px;
            border: none;
            background-color: #8ca8b8;
            color: white;
            border-radius: 16px;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>每日健康打卡</h1>
        <div class="date-text" id="todayDate"></div>
    </div>

    <div class="task-item">
        <div>
            <div class="task-name">起床打卡</div>
            <div class="time-show" id="wakeTime"></div>
        </div>
        <button class="btn-normal" id="btnWake" onclick="clockWakeUp()">打卡</button>
    </div>

    <div class="task-item">
        <div class="task-name">吃早餐</div>
        <button class="btn-normal" id="btnBreakfast" onclick="commonClock('breakfast')">打卡</button>
    </div>

    <div class="task-item">
        <div class="task-name">足量喝水</div>
        <button class="btn-normal" id="btnWater" onclick="commonClock('water')">打卡</button>
    </div>

    <div class="task-item">
        <div>
            <div class="task-name">排便记录</div>
            <div class="time-show" id="defecateTime"></div>
        </div>
        <button class="btn-normal" id="btnDefecate" onclick="toggleDefecateClock()">开始排便</button>
    </div>

    <div class="task-item">
        <div class="task-name">吃午餐</div>
        <button class="btn-normal" id="btnLunch" onclick="commonClock('lunch')">打卡</button>
    </div>

    <div class="task-item">
        <div class="task-name">吃晚餐</div>
        <button class="btn-normal" id="btnDinner" onclick="commonClock('dinner')">打卡</button>
    </div>

    <div class="progress-box">
        今日完成进度：<span id="progressText">0 / 6</span>
    </div>

    <!-- 鼓励语弹窗 -->
    <div class="modal-mask" id="modalMask">
        <div class="modal-card">
            <p class="modal-text" id="modalContent"></p>
            <button class="modal-close" onclick="closeModal()">确定</button>
        </div>
    </div>

<script>
    // ========== 文案库 全部添加适配emoji表情 ==========
    const wakeWord6to8 = [
        "🌅太棒了，早起的时光完全属于你，自律值直接拉满！",
        "☀️清晨的空气就是最好的礼物，今天一定会事事顺遂。",
        "✨别人还在熟睡，你已经开启充实的一天，太厉害了。",
        "⏰抓住清晨的黄金时间，今天的效率一定会超乎想象。",
        "🌤️早起不是煎熬，是你悄悄超越别人的小秘诀。",
        "🌞迎着晨光开启一天，你的状态已经赢在起点。",
        "🧘规律早起，你的身体和精神都会越来越稳定。",
        "📖清晨安静的时光，最适合沉淀自己、提升自己。"
    ];
    const wakeWord8to930 = [
        "🍃作息刚刚好，平稳从容地开启充实的一天。",
        "👍按时醒来，保持稳定的生活节奏就已经很棒了。",
        "💤睡眠充足，精神饱满，今天可以安心完成计划。",
        "🌿不早不晚，刚刚好的作息，舒服又健康。",
        "📅日常作息保持稳定，就是最踏实的自律。",
        "😊元气满满上线，放平心态，认真过完今天就好。",
        "🍵作息规律，身体没有负担，一整天都会很轻松。",
        "🌼自然醒的状态刚刚好，不用追赶时间，从容度日。"
    ];
    const wakeWord930to11 = [
        "😌睡得充足也不错，接下来好好把握白天的时间吧。",
        "⏳稍微起晚了一点，记得合理规划剩下的日程哦。",
        "💪睡饱才有精力，抓紧白天的时间把计划补上。",
        "😉偶尔睡懒觉没关系，调整状态，接下来高效行动。",
        "🛌充足的睡眠也是一种放松，别焦虑，认真做好接下来的事。",
        "🤍起床稍晚不用自责，把握当下就是最好的选择。",
        "🎯好好休整完毕，接下来集中精力完成今日任务。",
        "🌙偶尔放松作息没问题，记得今晚稍微早睡一点。"
    ];
    const wakeWordAfter11 = [
        "🌙熬夜很伤身体，今晚早点休息，明天争取早起一点。",
        "⚡白天已经过半，高效利用剩余时间弥补回来吧。",
        "🧹睡太久容易精神昏沉，起身活动一下唤醒身体吧。",
        "🛏️尽量减少熬夜，长期规律作息才是长久的健康之道。",
        "📝今天作息稍有拖沓，把任务高效完成，今晚好好早睡。",
        "😴懒觉虽舒服，但是规律作息会让你一整天更清爽。",
        "🔥从现在开始打起精神，把白天的时间充分利用起来。",
        "🔄调整作息节奏，慢慢养成早睡早起的好习惯。"
    ];
    const defecateWord = [
        "✅肠道通畅，身体无负担，健康状态稳稳在线。",
        "🧻规律排便，是守护肠胃健康最简单的方式。",
        "🔁养成固定排便习惯，你的代谢会越来越健康。",
        "🌬️身体排出废物，整个人都会变得轻松舒适。",
        "📈小小的健康习惯，日积月累会给你巨大回报。",
        "😌肠胃舒适，一整天的精神状态都会格外好。",
        "💚坚持规律习惯，远离肠胃不适，自在每一天。",
        "💡健康藏在细节里，这个好习惯一定要保持下去。"
    ];
    const commonWord = [
        "🍚好好吃饭，照顾好自己就是人生最重要的事。",
        "💪坚持健康的小习惯，日积月累身体会越来越棒。",
        "📝平凡日常里的每一次打卡，都是慢慢变好的印记。",
        "✨保持生活的仪式感，认真对待三餐与日常。",
        "🌱微小的坚持，日积月累终将变成刻在身上的好习惯。",
        "💧规律补水，给身体充足的水分，活力满满一整天。",
        "🥣三餐定时，肠胃舒适，身体自然会回馈你健康。",
        "⏳自律从来不是大事，就是日复一日的日常打卡。",
        "❤️善待身体，好好吃饭多喝水，就是性价比最高的投资。",
        "⏰日常的小小坚持，时间会看见你的所有努力。",
        "🌿把健康融入日常，不用刻意自律，习惯自然成型。",
        "🌟认真生活的人，总能在平凡日子里收获惊喜。",
        "🔍细节决定健康，你日复一日的坚持格外珍贵。",
        "📊持续做好日常小事，你的身体状态只会越来越好。",
        "⚡按时补给能量，身体有底气，做事更有底气。",
        "🥤多喝水、好好吃饭，最简单也最有效的养生方式。",
        "🤍不必追求极致，稳定坚持日常习惯就已经足够优秀。",
        "🎉今日又完成一项打卡，距离更好的自己又近一步。",
        "🛤️健康没有捷径，只有日复一日脚踏实地的坚持。",
        "🧱你的每一次打卡，都在为长久的健康铺路。"
    ];

    // 初始化本地存储
    let today = new Date().toLocaleDateString();
    let store = JSON.parse(localStorage.getItem("healthClock")) || {};
    if(store.date !== today){
        store = {
            date: today,
            finished: {},
            usedWords: [],
            wakeUpTime: "",
            defecateStart: null,
            defecateDuration: 0
        };
        localStorage.setItem("healthClock", JSON.stringify(store));
    }

    // 页面渲染
    function renderPage(){
        document.getElementById("todayDate").innerText = new Date().toLocaleString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
        // 起床按钮
        if(store.finished.wake){
            document.getElementById("btnWake").className = "btn-normal btn-done";
            document.getElementById("btnWake").innerText = "已打卡";
            document.getElementById("wakeTime").innerText = store.wakeUpTime;
        }
        // 普通打卡项
        const list = ["breakfast","water","lunch","dinner"];
        list.forEach(key=>{
            const btnId = "btn"+key.charAt(0).toUpperCase()+key.slice(1);
            const btn = document.getElementById(btnId);
            if(store.finished[key]){
                btn.className = "btn-normal btn-done";
                btn.innerText = "已打卡";
            }
        })
        // 排便按钮
        const defBtn = document.getElementById("btnDefecate");
        if(store.finished.defecate){
            defBtn.className = "btn-normal btn-done";
            defBtn.innerText = "已完成";
            document.getElementById("defecateTime").innerText = "时长："+store.defecateDuration+" 秒";
        }else if(store.defecateStart){
            defBtn.className = "btn-normal btn-timing";
            defBtn.innerText = "结束排便";
            startDefecateTimer();
        }
        // 进度统计
        const total = 6;
        const doneNum = Object.keys(store.finished).length;
        document.getElementById("progressText").innerText = doneNum + " / " + total;
    }

    // 弹窗控制
    function showModal(text){
        document.getElementById("modalContent").innerText = text;
        document.getElementById("modalMask").style.display = "flex";
    }
    function closeModal(){
        document.getElementById("modalMask").style.display = "none";
    }

    // 抽取当日未使用文案，保证不重复
    function getUnusedWord(wordArray){
        let available = wordArray.filter((_,idx)=>!store.usedWords.includes(idx));
        if(available.length === 0) return wordArray[0];
        let randomIdx = Math.floor(Math.random()*available.length);
        let realIdx = wordArray.indexOf(available[randomIdx]);
        store.usedWords.push(realIdx);
        localStorage.setItem("healthClock", JSON.stringify(store));
        return available[randomIdx];
    }

    // 起床打卡 分时判断
    function clockWakeUp(){
        if(store.finished.wake) return;
        const now = new Date();
        const hour = now.getHours();
        const minute = now.getMinutes();
        const timeStr = `${hour}:${String(minute).padStart(2,'0')}`;
        store.finished.wake = true;
        store.wakeUpTime = timeStr;
        localStorage.setItem("healthClock", JSON.stringify(store));
        renderPage();
        let wordPool;
        const totalMin = hour*60 + minute;
        if(totalMin >= 360 && totalMin <= 480){
            wordPool = wakeWord6to8;
        }else if(totalMin > 480 && totalMin <= 570){
            wordPool = wakeWord8to930;
        }else if(totalMin > 570 && totalMin <= 660){
            wordPool = wakeWord930to11;
        }else{
            wordPool = wakeWordAfter11;
        }
        const tip = getUnusedWord(wordPool);
        showModal(tip);
    }

    // 三餐、喝水通用打卡
    function commonClock(key){
        if(store.finished[key]) return;
        store.finished[key] = true;
        localStorage.setItem("healthClock", JSON.stringify(store));
        renderPage();
        const tip = getUnusedWord(commonWord);
        showModal(tip);
    }

    // 排便计时逻辑
    let defecateTimer = null;
    function toggleDefecateClock(){
        if(store.finished.defecate) return;
        if(!store.defecateStart){
            store.defecateStart = Date.now();
            localStorage.setItem("healthClock", JSON.stringify(store));
            renderPage();
            startDefecateTimer();
        }else{
            clearInterval(defecateTimer);
            const duration = Math.round((Date.now() - store.defecateStart)/1000);
            store.defecateDuration = duration;
            store.finished.defecate = true;
            store.defecateStart = null;
            localStorage.setItem("healthClock", JSON.stringify(store));
            renderPage();
            const tip = getUnusedWord(defecateWord);
            showModal(tip);
        }
    }
    function startDefecateTimer(){
        defecateTimer = setInterval(()=>{
            const dur = Math.round((Date.now() - store.defecateStart)/1000);
            document.getElementById("defecateTime").innerText = "已计时："+dur+" 秒";
        },1000);
    }

    // 页面初始化渲染
    renderPage();
</script>
</body>
</html>
